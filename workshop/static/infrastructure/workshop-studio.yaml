AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  GameLift Workshop - Workshop Studio pre-provisioning. Creates a cloud
  development machine (code-server / VS Code in the browser) with all tools
  installed and the workshop repository pre-cloned. The instance doubles as
  the participant's GameLift Anywhere compute in Module 3, so its security
  group opens the game port.

Parameters:
  RepoUrl:
    Type: String
    Default: https://github.com/aws-samples/sample-gamelift-workshop-pixelrush.git
    Description: Workshop repository to pre-clone
  InstanceType:
    Type: String
    Default: t3.large
    Description: Dev machine instance type (2 vCPU / 8 GB is comfortable for CDK + Go builds)
  VpcCidr:
    Type: String
    Default: 10.42.0.0/16
    Description: CIDR block for the workshop VPC
  SubnetCidr:
    Type: String
    Default: 10.42.0.0/24
    Description: CIDR block for the public subnet (must fall within VpcCidr)
  VolumeSizeGb:
    Type: Number
    Default: 30
    Description: Root EBS volume size (GiB) for the dev machine
  GoVersion:
    Type: String
    Default: 1.26.2
    Description: Go version for the dev machine (must satisfy server/go.mod)
  CodeServerVersion:
    Type: String
    Default: 4.99.3
    Description: Browser IDE version pinned for the dev machine

Resources:

  # ---------- credentials ----------
  # code-server login password, generated at deploy time (never hardcoded in
  # the template). Stored in Secrets Manager and surfaced to the participant
  # via the CodeServerPassword stack output.
  CodeServerPasswordSecret:
    Type: AWS::SecretsManager::Secret
    # Workshop credential: delete with the stack (nothing to retain post-event).
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      Description: code-server browser IDE login password (workshop dev machine)
      GenerateSecretString:
        PasswordLength: 20
        ExcludePunctuation: true

  # ---------- network ----------
  WorkshopVpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags: [{ Key: Name, Value: gamelift-workshop-vpc }]

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref WorkshopVpc
      CidrBlock: !Ref SubnetCidr
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs '']

  Igw:
    Type: AWS::EC2::InternetGateway
  IgwAttach:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref WorkshopVpc
      InternetGatewayId: !Ref Igw
  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref WorkshopVpc
  DefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: IgwAttach
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref Igw
  SubnetRoute:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref RouteTable

  # ---------- security ----------
  DevSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: >-
        code-server access + game ports (this instance acts as the GameLift
        Anywhere compute in Module 3; participant browsers connect to the
        game server running on it).
      VpcId: !Ref WorkshopVpc
      SecurityGroupIngress:
        # code-server origin: reached by CloudFront edges, not participants
        # directly (password auth protects it either way)
        - { IpProtocol: tcp, FromPort: 8080, ToPort: 8080, CidrIp: 0.0.0.0/0, Description: code-server HTTP origin for CloudFront }
        - { IpProtocol: tcp, FromPort: 1935, ToPort: 1935, CidrIp: 0.0.0.0/0, Description: Anywhere game server (Module 3) }
        - { IpProtocol: udp, FromPort: 1935, ToPort: 1935, CidrIp: 0.0.0.0/0, Description: Anywhere game server WebRTC/UDP }
      # Explicit egress (instance needs outbound HTTPS/DNS for AWS APIs and
      # package repositories). Stating it satisfies cfn_nag F1000 instead of
      # relying on the implicit allow-all default.
      SecurityGroupEgress:
        - { IpProtocol: tcp, FromPort: 443, ToPort: 443, CidrIp: 0.0.0.0/0, Description: "HTTPS outbound (AWS APIs, package repositories)" }
        - { IpProtocol: tcp, FromPort: 80, ToPort: 80, CidrIp: 0.0.0.0/0, Description: HTTP outbound (package repositories) }
        - { IpProtocol: udp, FromPort: 53, ToPort: 53, CidrIp: 0.0.0.0/0, Description: DNS out }

  # ---------- IAM ----------
  DevInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: ec2.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        # PowerUserAccess (all services EXCEPT IAM/Organizations/account
        # management) instead of AdministratorAccess — the dev machine runs the
        # workshop's `cdk deploy`, which needs broad service access but not
        # account/org control. The scoped IAM below covers the roles CDK must
        # create (cdk bootstrap roles + PixelRush* stack roles).
        - arn:aws:iam::aws:policy/PowerUserAccess
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: CdkAndStackRoles
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Create/manage only the IAM roles the workshop's CDK app needs
              # (account-scoped; the cdk-*/PixelRush* name wildcards match the
              # roles CDK generates for its bootstrap + stacks).
              - Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:GetRole
                  - iam:TagRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRolePolicy
                Resource:
                  - !Sub arn:aws:iam::${AWS::AccountId}:role/cdk-*
                  - !Sub arn:aws:iam::${AWS::AccountId}:role/PixelRush*
              # PassRole split out with a service condition so these roles can
              # only be handed to the workshop's own AWS services, not anywhere.
              - Effect: Allow
                Action: iam:PassRole
                Resource:
                  - !Sub arn:aws:iam::${AWS::AccountId}:role/cdk-*
                  - !Sub arn:aws:iam::${AWS::AccountId}:role/PixelRush*
                Condition:
                  StringEquals:
                    iam:PassedToService:
                      - cloudformation.amazonaws.com
                      - gamelift.amazonaws.com
                      - lambda.amazonaws.com
                      - ec2.amazonaws.com
              # cdk bootstrap/diff reads the roles it manages. Scope the reads
              # to the same cdk-*/PixelRush* roles this policy can create, so no
              # blanket iam:Get*/List* on '*'.
              - Effect: Allow
                Action:
                  - iam:GetRole
                  - iam:GetRolePolicy
                  - iam:ListRolePolicies
                  - iam:ListAttachedRolePolicies
                  - iam:GetPolicy
                  - iam:GetPolicyVersion
                  - iam:ListPolicyVersions
                Resource:
                  - !Sub arn:aws:iam::${AWS::AccountId}:role/cdk-*
                  - !Sub arn:aws:iam::${AWS::AccountId}:role/PixelRush*
                  - !Sub arn:aws:iam::${AWS::AccountId}:policy/cdk-*

  DevInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref DevInstanceRole]

  # ---------- dev machine ----------
  DevInstance:
    Type: AWS::EC2::Instance
    # UserData resolves the code-server password via a
    # {{resolve:secretsmanager:...}} dynamic reference; that runtime lookup does
    # NOT create an implicit CloudFormation dependency, so declare it explicitly
    # to guarantee the secret exists before the instance boots.
    DependsOn: CodeServerPasswordSecret
    # Workshop resource: replace/delete with the stack (no data to retain).
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    # Hold the stack in CREATE_IN_PROGRESS until UserData signals success, so
    # downstream consumers (and participants) don't act on a half-provisioned
    # dev machine. UserData runs cfn-signal at the end (and on failure via trap).
    CreationPolicy:
      ResourceSignal:
        Count: 1
        Timeout: PT20M
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}'
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds: [!Ref DevSecurityGroup]
      IamInstanceProfile: !Ref DevInstanceProfile
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs: { VolumeSize: !Ref VolumeSizeGb, VolumeType: gp3, Encrypted: true }
      Tags: [{ Key: Name, Value: gamelift-workshop-dev }]
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail
          exec > /var/log/workshop-init.log 2>&1
          # cloud-init runs UserData without HOME; the code-server install
          # script dereferences $HOME and set -u would kill the whole script
          export HOME=/root

          # Signal CloudFormation on exit: SUCCESS (0) or FAILURE otherwise, so
          # the stack's CreationPolicy resolves instead of timing out silently.
          dnf install -y git docker aws-cfn-bootstrap
          trap 'rc=$?; /opt/aws/bin/cfn-signal -e $rc --stack ${AWS::StackName} --resource DevInstance --region ${AWS::Region} || true' EXIT
          systemctl enable --now docker

          useradd -m workshop || true
          usermod -aG docker workshop

          # Clone the workshop repository, then drop the tutorial-authoring dir
          # (workshop/) — participants read the tutorial on the Workshop Studio
          # site, not in the checkout.
          sudo -u workshop bash -c '
            cd /home/workshop
            git clone ${RepoUrl} gamelift-workshop || true
            cd gamelift-workshop
            rm -rf workshop
          '

          # Run the repository's machine-setup script.
          bash /home/workshop/gamelift-workshop/scripts/install-dev-tools.sh \
            "${GoVersion}" "${CodeServerVersion}"

          # Install workshop project dependencies.
          sudo -u workshop bash -c '
            cd /home/workshop/gamelift-workshop
            (cd infra && npm install) || true
            (cd backend && npm install) || true
            (cd frontend && npm install) || true
          '

          # code-server config (VS Code in the browser). Plain HTTP on 8080 —
          # TLS, the public 443 and a real certificate come from the CloudFront
          # distribution in front (corp networks reject bare-IP self-signed URLs;
          # a *.cloudfront.net URL passes).
          # Fetch the generated password from Secrets Manager at runtime. (A
          # {{resolve:secretsmanager}} dynamic reference does NOT work inside
          # UserData — CFN only resolves those in template properties, not in
          # the heredoc body — so the literal would otherwise land in the file.)
          CS_PASSWORD=$(aws secretsmanager get-secret-value \
            --secret-id ${CodeServerPasswordSecret} --region ${AWS::Region} \
            --query SecretString --output text)
          mkdir -p /home/workshop/.config/code-server
          cat > /home/workshop/.config/code-server/config.yaml << CFG
          bind-addr: 0.0.0.0:8080
          auth: password
          password: $CS_PASSWORD
          cert: false
          CFG
          chown -R workshop:workshop /home/workshop/.config

          # the Anywhere script needs the instance public IP for RegisterCompute
          TOKEN=$(curl -sX PUT http://169.254.169.254/latest/api/token -H 'X-aws-ec2-metadata-token-ttl-seconds: 300')
          PUB_IP=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/public-ipv4)
          echo "export COMPUTE_IP=$PUB_IP" >> /home/workshop/.bashrc
          echo "export AWS_REGION=${AWS::Region}" >> /home/workshop/.bashrc

          # run code-server as the workshop user
          cat > /etc/systemd/system/code-server.service << SVC
          [Unit]
          Description=code-server
          After=network.target
          [Service]
          User=workshop
          ExecStart=/usr/bin/code-server --config /home/workshop/.config/code-server/config.yaml /home/workshop/gamelift-workshop
          Restart=always
          [Install]
          WantedBy=multi-user.target
          SVC
          systemctl enable --now code-server

  # ---------- CloudFront in front of code-server ----------
  # Participants open https://xxxx.cloudfront.net — a real TLS cert on 443,
  # which corporate networks accept (bare-IP origins are often blocked).
  # WebSockets (VS Code terminal) pass through CloudFront natively.
  CodeServerDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: gamelift-workshop code-server
        DefaultCacheBehavior:
          TargetOriginId: code-server
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
          # AWS-managed policy IDs (fixed, identical in every account/region —
          # not account-specific, so hardcoding is the documented usage):
          #   CachingDisabled          = 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
          #   AllViewer                = 216adef6-5c7f-47e4-b989-5492eafa07d3
          # AllViewer (not ...ExceptHostHeader) forwards the viewer Host header
          # so code-server sees Host == Origin == the cloudfront domain;
          # otherwise its WebSocket CSRF check rejects the connection (1006).
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
          OriginRequestPolicyId: 216adef6-5c7f-47e4-b989-5492eafa07d3
        Origins:
          - Id: code-server
            DomainName: !GetAtt DevInstance.PublicDnsName
            CustomOriginConfig:
              HTTPPort: 8080
              # http-only is required here, not a security downgrade: the origin
              # is a bare EC2 instance reached by its public DNS name, for which
              # no CA can issue a trusted TLS certificate (only AWS controls the
              # *.compute.amazonaws.com domain). HTTPS to such an origin would
              # require either a self-signed cert (which CloudFront rejects) or a
              # custom domain + ACM cert, neither of which a transient workshop
              # dev box has. The PARTICIPANT-facing hop is still encrypted:
              # ViewerProtocolPolicy above is redirect-to-https, so browsers
              # always use TLS to CloudFront. The unencrypted CloudFront->origin
              # hop stays inside AWS's network; code-server's own password auth
              # gates access. This is the standard pattern for fronting a
              # no-domain origin with CloudFront TLS.
              OriginProtocolPolicy: http-only

Outputs:
  CodeServerURL:
    Description: Open this in your browser (VS Code login page)
    Value: !Sub https://${CodeServerDistribution.DomainName}
  CodeServerPasswordSecretConsole:
    Description: >-
      Open this to reveal the browser-IDE password (click "Retrieve secret
      value"). CloudFormation does not expose Secrets Manager values as plain
      stack outputs, so the password is surfaced via its Secrets Manager console
      page instead.
    Value: !Sub 'https://${AWS::Region}.console.aws.amazon.com/secretsmanager/secret?name=${CodeServerPasswordSecret}&region=${AWS::Region}'
  InstancePublicIp:
    Description: Used automatically by run-anywhere.sh (COMPUTE_IP) in Module 3
    Value: !GetAtt DevInstance.PublicIp
  VpcId:
    Description: Workshop VPC ID (for VPC peering / troubleshooting)
    Value: !Ref WorkshopVpc
  DevSecurityGroupId:
    Description: Dev machine security group ID (for rule changes)
    Value: !Ref DevSecurityGroup
  DevInstanceId:
    Description: Dev machine instance ID (for SSM Session Manager access)
    Value: !Ref DevInstance
